<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <title>Oplev Japan 728x90</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Manrope:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <a class="banner" id="banner" href="javascript:void(0);" aria-label="Se rejser til Japan">
    <div class="media" aria-hidden="true">
      <video
        class="media__video"
        id="bgVideo"
        muted
        playsinline
        autoplay
        loop
        preload="auto"
        poster="../assets/img/shibuya-crossing.jpg">
        <source src="../assets/video/hero-japan.mp4" type="video/mp4">
      </video>
      <img class="media__image media__image--poster" src="../assets/img/shibuya-crossing.jpg" alt="">
      <div class="media__glow media__glow--pink"></div>
      <div class="media__glow media__glow--violet"></div>
      <div class="media__grain"></div>
      <div class="media__shade"></div>
    </div>

    <div class="logo-bubble" aria-hidden="true">
      <img class="logo-bubble__image logo-bubble__image--vf" src="../assets/img/vf-logo-white.png" alt="">
      <img class="logo-bubble__image logo-bubble__image--jubilee" src="../assets/img/jubiii-rejse-white.png" alt="">
    </div>

    <div class="content">
      <div class="copy">
        <h1>Oplev Japan</h1>
        <p class="subtitle">På en grupperejse med dansktalende rejseleder</p>
      </div>
      <span class="cta">Se rejser</span>
    </div>
  </a>

  <script src="script.js"></script>
</body>
</html>
